# --- Defaults REC-IMPALA ---

system_name: rec_impala # Name of the system.

# --- RL hyperparameters ---
actor_lr: 1e-4 # Learning rate for actor network
critic_lr: 1e-4 # Learning rate for critic network
rollout_length: 16 # Number of environment steps per vectorised environment.
gamma: 0.99 # Discounting factor
vtrace_lambda: 0.95 # Lambda parameter for V-trace (paper uses 1.0)
clip_rho_threshold: 1.0 # Importance weight clipping threshold for value correction (ρ̄)
clip_pg_rho_threshold: 1.0 # Importance weight clipping threshold for policy gradient (c̄)
ent_coef: 0.0 # Entropy regularisation term for loss function
vf_coef: 0.5 # Value function coefficient in loss
max_grad_norm: 0.5 # Maximum norm of the gradients for a weight update
normalize_rewards: True # Whether to normalize rewards (as done in paper)
reward_scale: 1.0 # Scale factor for reward normalization
reward_eps: 1e-8 # Epsilon for reward normalization numerical stability
